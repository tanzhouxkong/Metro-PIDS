<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metro PIDS - Display 3 (LCD 弧形布局)</title>
  <link rel="stylesheet" href="../../assets/fontawesome/css/all.min.css" onerror="console.warn('[Display-3] Font Awesome 加载失败'); var fallback = document.createElement('link'); fallback.rel = 'stylesheet'; fallback.href = '../../assets/local-icons.css'; document.head.appendChild(fallback);">
  <meta name="app-version" content="display-3" />
  <script type="importmap">

      padding: 0;

    }

      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
