<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;">
    <title>Sidebar - Metro PIDS</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css" onerror="console.warn('[Sidebar] Font Awesome load failed, using local fallback'); var fallback = document.createElement('link'); fallback.rel = 'stylesheet'; fallback.href = 'assets/local-icons.css'; document.head.appendChild(fallback);">
    <script>
      (function () {
        function ensureLocalIconsFallback() {
          try {
            if (document.fonts && typeof document.fonts.check === 'function') {
              if (
                document.fonts.check('12px "Font Awesome 6 Free"') ||
                document.fonts.check('12px "Font Awesome 6 Brands"')
              ) return;
            }
          } catch (e) {}
          if (!document.querySelector('link[href="assets/local-icons.css"]')) {
            console.warn('[Sidebar] Font Awesome font not ready, using local fallback');
            var fallback = document.createElement('link');
            fallback.rel = 'stylesheet';
            fallback.href = 'assets/local-icons.css';
            document.head.appendChild(fallback);
          }
        }
        window.addEventListener('load', function () { setTimeout(ensureLocalIconsFallback, 800); });
        setTimeout(ensureLocalIconsFallback, 1800);
      })();
    </script>
    <style>
        :root {
            --theme: #00b894;
            --font: "Microsoft YaHei", sans-serif;
            --bg: #f0f2f5;
            --card: #ffffff;
            --card-border: #f0f0f0;
            --text: #2d3436;
            --muted: #9aa0a6;
            --btn-blue-bg: #1677ff;
            --accent: #00b894;
            --titlebar-bg: rgba(255, 255, 255, 0.85);
            --titlebar-border: rgba(0, 0, 0, 0.08);
            --rail-bg: rgba(255,255,255,0.65);
        }
        html.dark,
        html[data-theme='dark'] {
            --bg: #0b1116;
            --card: #091018;
            --card-border: rgba(255,255,255,0.04);
            --text: #e6eef6;
            --muted: #9aa6b2;
            --titlebar-bg: rgba(11, 17, 22, 0.85);
            --titlebar-border: rgba(255, 255, 255, 0.08);
            --rail-bg: rgba(7, 16, 24, 0.65);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            font-family: var(--font);
            color: var(--text);
        }
        .sidebar-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            min-height: 100vh;
            background: transparent;
            position: relative;
            z-index: 9999;
            overflow: hidden;
            pointer-events: auto;
        }
        .sidebar-section {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
            width: 72px;
            height: 100%;
            pointer-events: auto;
        }
        #leftrail-app {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            pointer-events: auto;
            background: transparent;
        }
        .left-rail-blur,
        html.dark .left-rail-blur,
        html[data-theme='dark'] .left-rail-blur,
        html.dark .sidebar-container,
        html[data-theme='dark'] .sidebar-container {
            background: transparent !important;
        }
        #leftRail .left-rail-icon-btn.ant-btn {
            width: 68px;
            min-width: 68px;
            height: 64px;
            padding: 8px 6px !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto !important;
            line-height: 1 !important;
            overflow: visible;
            border: none !important;
            border-radius: 18px !important;
            transition: transform 0.2s, filter 0.2s, box-shadow 0.2s;
            text-align: center !important;
            position: relative;
            left: -4px;
        }
        #leftRail .left-rail-icon-btn.ant-btn:hover,
        #leftRail .left-rail-icon-btn.ant-btn:focus,
        #leftRail .left-rail-icon-btn.ant-btn:focus-visible,
        #leftRail .left-rail-icon-btn.ant-btn:active {
            border: none !important;
        }
        #leftRail .left-rail-icon-btn.ant-btn > span {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            line-height: 1 !important;
            height: 100%;
            width: 100%;
            gap: 4px;
            color: inherit !important;
            text-align: center !important;
            padding: 0 !important;
            margin: 0 auto !important;
        }
        #leftRail .left-rail-icon-btn.ant-btn .ant-btn-icon {
            line-height: 1 !important;
            margin-inline-end: 0 !important;
        }
        #leftRail .left-rail-btn-content,
        #leftRail .left-rail-btn-icon,
        #leftRail .left-rail-btn-label {
            color: inherit !important;
        }
        #leftRail .left-rail-btn-icon {
            font-size: 18px;
            line-height: 1;
        }
        #leftRail .left-rail-btn-label {
            font-size: 11px;
            font-weight: 600;
            line-height: 1.1;
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-primary,
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-variant-solid.ant-btn-color-primary {
            background: transparent !important;
            box-shadow: none !important;
            color: var(--ant-color-primary, #1677ff) !important;
        }
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-default,
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-variant-outlined,
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-color-default {
            background: transparent !important;
            color: var(--text) !important;
            box-shadow: none !important;
        }
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-default:hover,
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-variant-outlined:hover,
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-color-default:hover {
            filter: none !important;
            background: transparent !important;
            box-shadow: none;
        }
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-primary:hover,
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-variant-solid.ant-btn-color-primary:hover {
            filter: brightness(0.92);
            background: transparent !important;
            box-shadow: none;
        }
        #leftRail .left-rail-icon-btn.ant-btn:active {
            transform: translateY(1px);
        }
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-primary:active,
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-variant-solid.ant-btn-color-primary:active {
            filter: brightness(0.9);
            background: transparent !important;
        }
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-default:active,
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-variant-outlined:active,
        #leftRail .left-rail-icon-btn.ant-btn.ant-btn-color-default:active {
            filter: none !important;
            background: transparent !important;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "vue": "./assets/vue.esm-browser.js"
            }
        }
    </script>
</head>
<body>
    <div class="sidebar-container">
        <div class="sidebar-section" id="sidebar-section">
            <div id="leftrail-app"></div>
        </div>
    </div>
    <script type="module" src="/src/sidebarEntry.js"></script>
</body>
</html>
